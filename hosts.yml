
variables:
  RKE2_VERSION: "v1.35.1+rke2r1"
  SKOPEO_IMAGE: "registry.gitlab.example.com/platform/tools/skopeo-custom:latest"

stages:
  - sync

sync-all-images:
  stage: sync
  image: $SKOPEO_IMAGE
  when: manual
  script:
    - skopeo login -u "$CI_REGISTRY_USER" -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
    - |
      set -e
      VERSION_URL=$(echo "$RKE2_VERSION" | sed 's/+/%2B/g')
      BASE_URL="https://github.com/rancher/rke2/releases/download/${VERSION_URL}"

      echo ">>> Téléchargement de la liste d'images..."
      wget -q -O images-all.txt "${BASE_URL}/rke2-images-all.linux-amd64.txt"

      TOTAL=$(wc -l < images-all.txt | tr -d ' ')
      COUNT=0
      FAILED=0

      echo ">>> ${TOTAL} images à synchroniser"
      echo ""

      while read -r SOURCE; do
        [ -z "$SOURCE" ] && continue
        COUNT=$((COUNT + 1))

        # Extraire namespace/image:tag (supprimer le registry source)
        SHORT=$(echo "$SOURCE" | sed \
          -e 's|^docker\.io/||' \
          -e 's|^quay\.io/||' \
          -e 's|^registry\.k8s\.io/||' \
          -e 's|^ghcr\.io/||')

        TARGET="${CI_REGISTRY_IMAGE}/${SHORT}"

        echo "[${COUNT}/${TOTAL}] ${SOURCE}"
        echo "           → ${TARGET}"

        if skopeo copy \
            --retry-times 3 \
            "docker://${SOURCE}" \
            "docker://${TARGET}"; then
          echo "           ✓ OK"
        else
          echo "           ✗ FAILED"
          FAILED=$((FAILED + 1))
        fi

      done < images-all.txt

      echo ""
      echo "────────────────────────────────────"
      echo "Résumé : Total=${TOTAL} | OK=$((COUNT - FAILED)) | Échecs=${FAILED}"
      echo "────────────────────────────────────"
      [ "$FAILED" -eq 0 ] || exit 1





deploy-cluster:
  stage: deploy
  image: $ANSIBLE_IMAGE
  when: manual
  needs:
    - job: download-artifacts
      artifacts: true
    - job: check-connectivity
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      cat > registries.yaml <<EOF
      mirrors:
        "docker.io":
          endpoint:
            - "https://${CI_REGISTRY_IMAGE}"
      configs:
        "${CI_REGISTRY}":
          auth:
            username: "${REGISTRY_DEPLOY_USERNAME}"
            password: "${REGISTRY_DEPLOY_PASSWORD}"
          tls:
            insecure_skip_verify: false
      EOF
    - |
      cat > deploy-vars.yml <<EOF
      rke2_install_version: "${RKE2_VERSION}"
      rke2_force_tarball_install: true
      rke2_install_local_tarball_path: "${CI_PROJECT_DIR}/artifacts/rke2.linux-amd64"
      rke2_registry_config_file_path: "${CI_PROJECT_DIR}/registries.yaml"
      EOF
    - ansible-playbook playbooks/install.yml -i inventory/cluster/ -b -e @deploy-vars.yml
    - echo "✓ Cluster RKE2 déployé"






# ──────────────────────────────
# Stage cleanup — Désinstallation RKE2
# ──────────────────────────────
rke2-uninstall:
  stage: cleanup
  image: $ANSIBLE_IMAGE
  when: manual
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      ansible-playbook playbooks/rke2-uninstall.yml \
        -i inventory/cluster/ \
        -u root \
        -e "deploy_user=${DEPLOY_USER}"
    - echo "✓ RKE2 désinstallé sur tous les nœuds"

---
# Désinstallation complète de RKE2 sur tous les nœuds
# Méthode : tarball → /usr/local/bin/rke2-uninstall.sh

- name: Uninstall RKE2 on all nodes
  hosts: all
  become: true
  order: reverse_inventory   # agents d'abord, servers ensuite

  tasks:
    - name: Check if RKE2 uninstall script exists
      ansible.builtin.stat:
        path: /usr/local/bin/rke2-uninstall.sh
      register: uninstall_script

    - name: Run RKE2 uninstall script
      ansible.builtin.shell: /usr/local/bin/rke2-uninstall.sh
      when: uninstall_script.stat.exists
      register: uninstall_result
      ignore_errors: true

    - name: Stop RKE2 services if still running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - rke2-server
        - rke2-agent
      ignore_errors: true

    - name: Remove RKE2 data directory
      ansible.builtin.file:
        path: /var/lib/rancher/rke2
        state: absent

    - name: Remove RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: absent

    - name: Remove RKE2 binaries
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/rke2
        - /usr/local/bin/rke2-uninstall.sh
        - /usr/local/bin/kubectl
        - /usr/local/bin/crictl
        - /usr/local/bin/ctr

    - name: Remove RKE2 systemd unit files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/rke2-server.service
        - /etc/systemd/system/rke2-agent.service
      notify: Reload systemd

    - name: Remove gtar symlink
      ansible.builtin.file:
        path: /usr/bin/gtar
        state: absent

    - name: Remove sudoers entry
      ansible.builtin.file:
        path: "/etc/sudoers.d/{{ deploy_user }}"
        state: absent
      when: deploy_user is defined

    - name: Print uninstall result
      ansible.builtin.debug:
        msg: "✓ RKE2 désinstallé sur {{ inventory_hostname }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true










---
- name: Set hostname on all nodes
  hosts: all
  become: true

  tasks:
    - name: Set hostname to inventory name
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Print result
      ansible.builtin.debug:
        msg: "✓ Hostname configuré : {{ inventory_hostname }} sur {{ ansible_host }}"



set-hostnames:
  stage: bootstrap
  image: $ANSIBLE_IMAGE
  when: manual
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      ansible-playbook playbooks/set-hostname.yml \
        -i inventory/cluster/ \
        -u root
    - echo "✓ Hostnames configurés"


