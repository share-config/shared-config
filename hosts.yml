# Stage cleanup вЂ” DГ©sinstallation RKE2
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
rke2-uninstall:
  stage: cleanup
  image: $ANSIBLE_IMAGE
  when: manual
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      ansible-playbook playbooks/rke2-uninstall.yml \
        -i inventory/cluster/ \
        -u root \
        -e "deploy_user=${DEPLOY_USER}"
    - echo "вњ“ RKE2 dГ©sinstallГ© sur tous les nЕ“uds"


