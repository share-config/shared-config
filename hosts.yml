download-artifacts:
  stage: prepare
  image: $ANSIBLE_IMAGE
  when: manual
  script:
    - mkdir -p artifacts
    - PKG_URL="${GITLAB_URL}/api/v4/projects/${P1_PROJECT_ID}/packages/generic/rke2/${RKE2_VERSION}"
    - |
      echo ">>> Téléchargement des artefacts RKE2 ${RKE2_VERSION}..."
      wget --header="PRIVATE-TOKEN: ${P1_DEPLOY_TOKEN}" \
           -O artifacts/rke2.linux-amd64 \
           "${PKG_URL}/rke2.linux-amd64"
      wget --header="PRIVATE-TOKEN: ${P1_DEPLOY_TOKEN}" \
           -O artifacts/rke2-images.linux-amd64.tar.zst \
           "${PKG_URL}/rke2-images.linux-amd64.tar.zst"
      wget --header="PRIVATE-TOKEN: ${P1_DEPLOY_TOKEN}" \
           -O artifacts/sha256sum-amd64.txt \
           "${PKG_URL}/sha256sum-amd64.txt"
    - |
      cd artifacts
      grep "rke2\.linux-amd64$" sha256sum-amd64.txt | sha256sum -c -
      grep "rke2-images\.linux-amd64\.tar\.zst$" sha256sum-amd64.txt | sha256sum -c -
    - echo "✓ Artefacts téléchargés et vérifiés"
  artifacts:
    paths:
      - artifacts/
    expire_in: 1 day








deploy-cluster:
  stage: deploy
  image: $ANSIBLE_IMAGE
  when: manual
  needs:
    - job: download-artifacts
      artifacts: true
    - job: check-connectivity
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      cat > deploy-vars.yml <<EOF
      rke2_install_version: "${RKE2_VERSION}"
      rke2_force_tarball_install: true
      rke2_install_local_tarball_path: "${CI_PROJECT_DIR}/artifacts/rke2.linux-amd64"
      rke2_images_local_tarball_path:
        - "${CI_PROJECT_DIR}/artifacts/rke2-images.linux-amd64.tar.zst"
      EOF
    - ansible-playbook playbooks/install.yml -i inventory/cluster/ -b -e @deploy-vars.yml
    - echo "✓ Cluster RKE2 déployé"




  script:
    - |
      cat > registries.yaml <<EOF
      mirrors:
        "test.gitkav.op.ma":
          endpoint:
            - "https://test.gitkav.op.ma/platform/rke2-artefacts/rke2"
      configs:
        "test.gitkav.op.ma":
          auth:
            username: "${REGISTRY_DEPLOY_USERNAME}"
            password: "${REGISTRY_DEPLOY_PASSWORD}"
          tls:
            insecure_skip_verify: false
      EOF
    - |
      cat > deploy-vars.yml <<EOF
      rke2_install_version: "${RKE2_VERSION}"
      rke2_force_tarball_install: true
      rke2_install_local_tarball_path: "${CI_PROJECT_DIR}/artifacts/rke2.linux-amd64"
      rke2_registry_config_file_path: "${CI_PROJECT_DIR}/registries.yaml"
      cluster_rke2_config:
        system-default-registry: "test.gitkav.op.ma"
      EOF
    - ansible-playbook playbooks/install.yml -i inventory/cluster/ -b -e @deploy-vars.yml







push_tarball() {
  local ZST="$1"
  local TAR="${ZST%.zst}"

  wget -q -O "${ZST}" "${BASE_URL}/${ZST}"
  zstd -d "${ZST}" -o "${TAR}" && rm -f "${ZST}"

  tar -xOf "${TAR}" manifest.json \
    | jq -r '.[].RepoTags[] | select(. != null)' \
    | while read -r IMAGE; do
        # Garder uniquement les deux derniers segments : namespace/image:tag
        SHORT=$(echo "$IMAGE" | awk -F'/' '{print $(NF-1)"/"$NF}')
        TARGET="${CI_REGISTRY_IMAGE}/mirror/${SHORT}"
        echo "    ${IMAGE} -> ${TARGET}"
        skopeo copy "docker-archive:${TAR}:${IMAGE}" "docker://${TARGET}"
        echo "${TARGET}" >> pushed-images.txt
      done

  rm -f "${TAR}"
}
