
---
# Ajoute des entrées dans /etc/hosts sur tous les nœuds RKE2
# Variable requise : extra_hosts (définie dans group_vars/all.yml)
#
# Format de extra_hosts :
#   extra_hosts:
#     - ip: "192.168.1.100"
#       hostname: "test.gitkav.op.ma"
#     - ip: "192.168.1.101"
#       hostname: "autre-host.example.com"

- name: Add hosts entries on RKE2 nodes
  hosts: all
  become: true

  tasks:
    - name: Add entries to /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item.ip }} {{ item.hostname }}"
        regexp: "^.*{{ item.hostname }}$"
        state: present
        backup: yes
      loop: "{{ extra_hosts }}"
      # Idempotent : remplace la ligne si le hostname existe déjà
      # backup: yes → sauvegarde /etc/hosts avant modification



# Entrées /etc/hosts à ajouter sur tous les nœuds
extra_hosts:
  - ip: "192.168.1.100"
    hostname: "test.gitkav.op.ma"
  # Ajoutez d'autres entrées si nécessaire
  # - ip: "192.168.1.101"
  #   hostname: "autre-host.example.com"





