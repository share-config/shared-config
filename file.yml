push_tarball() {
  local ZST="$1"
  local TAR="${ZST%.zst}"

  wget -q -O "${ZST}" "${BASE_URL}/${ZST}"
  zstd -d "${ZST}" -o "${TAR}" && rm -f "${ZST}"

  tar -xOf "${TAR}" manifest.json \
    | jq -r '.[].RepoTags[] | select(. != null)' \
    | while read -r IMAGE; do
        # Extraire le registry source (docker.io, quay.io, etc.)
        REGISTRY=$(echo "$IMAGE" | cut -d'/' -f1)
        # Extraire le reste (namespace/image:tag)
        REMAINDER=$(echo "$IMAGE" | cut -d'/' -f2-)
        # Target : mirror/<registry-source>/<namespace>/<image>:<tag>
        TARGET="${CI_REGISTRY_IMAGE}/mirror/${REGISTRY}/${REMAINDER}"
        echo "    ${IMAGE} -> ${TARGET}"
        skopeo copy "docker-archive:${TAR}:${IMAGE}" "docker://${TARGET}"
        echo "${TARGET}" >> pushed-images.txt
      done

  rm -f "${TAR}"
}







mirrors:
  "docker.io":
    endpoint:
      - "https://test.gitkav.op.ma/platform/rke2-artefacts/mirror/docker.io"
  "quay.io":
    endpoint:
      - "https://test.gitkav.op.ma/platform/rke2-artefacts/mirror/quay.io"
  "registry.k8s.io":
    endpoint:
      - "https://test.gitkav.op.ma/platform/rke2-artefacts/mirror/registry.k8s.io"
  "ghcr.io":
    endpoint:
      - "https://test.gitkav.op.ma/platform/rke2-artefacts/mirror/ghcr.io"

configs:
  "test.gitkav.op.ma":
    auth:
      username: "${REGISTRY_DEPLOY_USERNAME}"
      password: "${REGISTRY_DEPLOY_PASSWORD}"
    tls:
      insecure_skip_verify: false







deploy-cluster:
  stage: deploy
  image: $ANSIBLE_IMAGE
  when: manual
  needs:
    - job: download-artifacts
      artifacts: true
    - job: check-connectivity
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      cat > registries.yaml <<EOF
      mirrors:
        "docker.io":
          endpoint:
            - "https://${CI_REGISTRY}/platform/rke2-artefacts/mirror/docker.io"
        "quay.io":
          endpoint:
            - "https://${CI_REGISTRY}/platform/rke2-artefacts/mirror/quay.io"
        "registry.k8s.io":
          endpoint:
            - "https://${CI_REGISTRY}/platform/rke2-artefacts/mirror/registry.k8s.io"
        "ghcr.io":
          endpoint:
            - "https://${CI_REGISTRY}/platform/rke2-artefacts/mirror/ghcr.io"
      configs:
        "${CI_REGISTRY}":
          auth:
            username: "${REGISTRY_DEPLOY_USERNAME}"
            password: "${REGISTRY_DEPLOY_PASSWORD}"
          tls:
            insecure_skip_verify: false
      EOF
    - |
      cat > deploy-vars.yml <<EOF
      rke2_install_version: "${RKE2_VERSION}"
      rke2_force_tarball_install: true
      rke2_install_local_tarball_path: "${CI_PROJECT_DIR}/artifacts/rke2.linux-amd64"
      rke2_registry_config_file_path: "${CI_PROJECT_DIR}/registries.yaml"
      EOF
    - ansible-playbook playbooks/install.yml -i inventory/cluster/ -b -e @deploy-vars.yml
    - echo "✓ Cluster RKE2 déployé"
