publish-rancher-chart:
  stage: publish
  image: "${DEPLOY_IMAGE}"
  variables:
    RANCHER_VERSION: "2.10.3"
    HELM_CHANNEL: "stable"
  script:
    # 1. Repo officiel Rancher stable
    - helm repo add rancher-stable https://releases.rancher.com/server-charts/stable
    - helm repo update rancher-stable

    # 2. Pull du chart (version = RANCHER_VERSION)
    - helm pull rancher-stable/rancher --version "${RANCHER_VERSION}"

    # 3. Push dans le GitLab Helm Package Registry
    - |
      curl --fail-with-body \
           --request POST \
           --user "gitlab-ci-token:${CI_JOB_TOKEN}" \
           --form "chart=@rancher-${RANCHER_VERSION}.tgz" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${HELM_CHANNEL}/charts"

    - echo "✓ rancher-${RANCHER_VERSION}.tgz publié dans Helm Package Registry"
  rules:
    - when: manual






sync-rancher-images:
  stage: sync
  image: "${DEPLOY_IMAGE}"
  variables:
    RANCHER_VERSION: "2.10.3"
    RANCHER_IMAGES_URL: "https://github.com/rancher/rancher/releases/download/v${RANCHER_VERSION}/rancher-images.txt"
  script:
    # 1. Télécharger la liste officielle
    - curl -fsSL "${RANCHER_IMAGES_URL}" -o rancher-images.txt
    - echo "── $(wc -l < rancher-images.txt) images à synchroniser ──"

    # 2. Login registry local
    - skopeo login "${CI_REGISTRY}" --username gitlab-ci-token --password "${CI_JOB_TOKEN}"

    # 3. Copier chaque image
    - |
      ERRORS=0
      TOTAL=0

      while IFS= read -r IMAGE || [ -n "$IMAGE" ]; do
        # ignorer lignes vides et commentaires
        [ -z "$IMAGE" ] && continue
        echo "$IMAGE" | grep -q '^#' && continue

        TOTAL=$((TOTAL + 1))

        # Normaliser : ajouter docker.io/ si pas de registry explicite
        # (rancher/rancher → docker.io/rancher/rancher)
        # (docker.io/rancher/xxx → inchangé)
        # (registry.k8s.io/xxx → inchangé)
        case "$IMAGE" in
          *.*/*) SRC="docker://${IMAGE}" ;;       # déjà un FQDN registry
          *)     SRC="docker://docker.io/${IMAGE}" ;;  # registry implicite docker.io
        esac

        # Destination : conserver le chemin complet sous CI_REGISTRY_IMAGE
        # docker.io/rancher/rancher:v2.10.3  → ${CI_REGISTRY_IMAGE}/rancher/rancher:v2.10.3
        # registry.k8s.io/pause:3.9          → ${CI_REGISTRY_IMAGE}/registry.k8s.io/pause:3.9
        REF="${IMAGE#docker.io/}"
        DST="docker://${CI_REGISTRY_IMAGE}/${REF}"

        echo "[${TOTAL}] ${IMAGE}"
        if skopeo copy \
            --override-os linux --override-arch amd64 \
            "${SRC}" "${DST}"; then
          echo "  ✓"
        else
          echo "  ✗ ERREUR"
          ERRORS=$((ERRORS + 1))
        fi
      done < rancher-images.txt

      echo "──────────────────────────────────────────"
      echo "Total : ${TOTAL} | OK : $((TOTAL - ERRORS)) | Erreurs : ${ERRORS}"
      [ "${ERRORS}" -eq 0 ] || exit 1
  rules:
    - when: manual











deploy-rancher:
  stage: platform
  image: "${DEPLOY_IMAGE}"
  variables:
    RANCHER_VERSION: "2.10.3"
    RANCHER_NAMESPACE: "cattle-system"
    RANCHER_DOMAIN: "rancher.app.platform.local"
    PLATFORM_SERVICES_PATH: "platform/rke2-platform-services"
    HELM_CHANNEL: "stable"
    REPLICAS: "3"
    # Variables masquées GitLab (Settings → CI/CD → Variables) :
    # CLUSTER_KUBECONFIG         (type: File)
    # HELM_DEPLOY_TOKEN_USER     (masked)
    # HELM_DEPLOY_TOKEN_PASSWORD (masked)
    # REGISTRY_USER              (masked)
    # REGISTRY_PASSWORD          (masked)
    # TLS_CERT_FILE              (type: File)  ← wildcard *.app.platform.local
    # TLS_KEY_FILE               (type: File)
    # CA_CERT_FILE               (type: File)  ← CA racine (si privateCA=true)
  script:
    # ── Construire les URLs depuis le group path ──────────────────
    - PLATFORM_PATH_ENC=$(echo "${PLATFORM_SERVICES_PATH}" | sed 's|/|%2F|g')
    - HELM_REPO_URL="${CI_API_V4_URL}/projects/${PLATFORM_PATH_ENC}/packages/helm/${HELM_CHANNEL}"
    - PLATFORM_REGISTRY="${CI_REGISTRY}/${PLATFORM_SERVICES_PATH}"
    - export KUBECONFIG="${CLUSTER_KUBECONFIG}"

    # ── 1. Helm repo ──────────────────────────────────────────────
    - helm repo add rancher-local "${HELM_REPO_URL}" --username "${HELM_DEPLOY_TOKEN_USER}" --password "${HELM_DEPLOY_TOKEN_PASSWORD}"
    - helm repo update rancher-local

    # ── 2. Namespace ──────────────────────────────────────────────
    - kubectl create namespace "${RANCHER_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

    # ── 3. imagePullSecret ────────────────────────────────────────
    - |
      DOCKER_AUTH=$(echo -n "${REGISTRY_USER}:${REGISTRY_PASSWORD}" | base64 -w0)
      kubectl create secret generic gitlab-registry-rancher \
        --from-literal=.dockerconfigjson="{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${REGISTRY_USER}\",\"password\":\"${REGISTRY_PASSWORD}\",\"auth\":\"${DOCKER_AUTH}\"}}}" \
        --type=kubernetes.io/dockerconfigjson \
        --namespace="${RANCHER_NAMESPACE}" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ── 4. TLS secret (nom imposé par Rancher) ────────────────────
    - |
      kubectl create secret tls tls-rancher-ingress \
        --cert="${TLS_CERT_FILE}" \
        --key="${TLS_KEY_FILE}" \
        --namespace="${RANCHER_NAMESPACE}" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ── 5. CA secret (requis si privateCA=true) ───────────────────
    - |
      kubectl create secret generic tls-ca \
        --from-file=cacerts.pem="${CA_CERT_FILE}" \
        --namespace="${RANCHER_NAMESPACE}" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ── 6. Helm upgrade --install ─────────────────────────────────
    - |
      helm upgrade --install rancher rancher-local/rancher \
        --version "${RANCHER_VERSION}" \
        --namespace "${RANCHER_NAMESPACE}" \
        --wait --timeout 15m \
        --set hostname="${RANCHER_DOMAIN}" \
        --set replicas="${REPLICAS}" \
        --set rancherImage="${PLATFORM_REGISTRY}/rancher/rancher" \
        --set systemDefaultRegistry="${PLATFORM_REGISTRY}" \
        --set useBundledSystemChart=true \
        --set ingress.tls.source=secret \
        --set privateCA=true \
        --set ingress.ingressClassName=nginx \
        --set imagePullSecrets[0].name=gitlab-registry-rancher

    # ── 7. Vérification ───────────────────────────────────────────
    - kubectl rollout status deployment/rancher -n "${RANCHER_NAMESPACE}" --timeout=10m
    - echo "✓ Rancher ${RANCHER_VERSION} → https://${RANCHER_DOMAIN}"
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
