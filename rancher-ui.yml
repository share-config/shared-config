publish-rancher-chart:
  stage: publish
  image: "${DEPLOY_IMAGE}"
  variables:
    RANCHER_VERSION: "2.10.3"
    HELM_CHANNEL: "stable"
  script:
    # 1. Repo officiel Rancher stable
    - helm repo add rancher-stable https://releases.rancher.com/server-charts/stable
    - helm repo update rancher-stable

    # 2. Pull du chart (version = RANCHER_VERSION)
    - helm pull rancher-stable/rancher --version "${RANCHER_VERSION}"

    # 3. Push dans le GitLab Helm Package Registry
    - |
      curl --fail-with-body \
           --request POST \
           --user "gitlab-ci-token:${CI_JOB_TOKEN}" \
           --form "chart=@rancher-${RANCHER_VERSION}.tgz" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${HELM_CHANNEL}/charts"

    - echo "✓ rancher-${RANCHER_VERSION}.tgz publié dans Helm Package Registry"
  rules:
    - when: manual





sync-rancher-images:
  stage: sync
  image: "${DEPLOY_IMAGE}"
  variables:
    RANCHER_VERSION: "v2.10.3"
    BCI_MICRO_VERSION: "15.6.24.2"
    SHELL_VERSION: "v0.3.1"
  script:
    - skopeo login "${CI_REGISTRY}" --username gitlab-ci-token --password "${CI_JOB_TOKEN}"
    - |
      copy_image() {
        SRC="docker://docker.io/${1}"
        DST="docker://${CI_REGISTRY_IMAGE}/${1}"
        echo "→ ${1}"
        skopeo copy --override-os linux --override-arch amd64 "${SRC}" "${DST}" \
          && echo "  ✓" || { echo "  ✗"; exit 1; }
      }

      copy_image "rancher/rancher:${RANCHER_VERSION}"
      copy_image "rancher/mirrored-bci-micro:${BCI_MICRO_VERSION}"
      copy_image "rancher/shell:${SHELL_VERSION}"
  rules:
    - when: manual












deploy-rancher:
  stage: platform
  image: "${DEPLOY_IMAGE}"
  variables:
    RANCHER_VERSION: "2.10.3"
    RANCHER_NAMESPACE: "cattle-system"
    RANCHER_DOMAIN: "rancher.app.platform.local"
    PLATFORM_SERVICES_PATH: "platform/rke2-platform-services"
    HELM_CHANNEL: "stable"
    REPLICAS: "3"
    # Variables masquées GitLab (Settings → CI/CD → Variables) :
    # CLUSTER_KUBECONFIG         (type: File)
    # HELM_DEPLOY_TOKEN_USER     (masked)
    # HELM_DEPLOY_TOKEN_PASSWORD (masked)
    # REGISTRY_USER              (masked)
    # REGISTRY_PASSWORD          (masked)
    # TLS_CERT_FILE              (type: File)  ← wildcard *.app.platform.local
    # TLS_KEY_FILE               (type: File)
    # CA_CERT_FILE               (type: File)  ← CA racine (si privateCA=true)
  script:
    # ── Construire les URLs depuis le group path ──────────────────
    - PLATFORM_PATH_ENC=$(echo "${PLATFORM_SERVICES_PATH}" | sed 's|/|%2F|g')
    - HELM_REPO_URL="${CI_API_V4_URL}/projects/${PLATFORM_PATH_ENC}/packages/helm/${HELM_CHANNEL}"
    - PLATFORM_REGISTRY="${CI_REGISTRY}/${PLATFORM_SERVICES_PATH}"
    - export KUBECONFIG="${CLUSTER_KUBECONFIG}"

    # ── 1. Helm repo ──────────────────────────────────────────────
    - helm repo add rancher-local "${HELM_REPO_URL}" --username "${HELM_DEPLOY_TOKEN_USER}" --password "${HELM_DEPLOY_TOKEN_PASSWORD}"
    - helm repo update rancher-local

    # ── 2. Namespace ──────────────────────────────────────────────
    - kubectl create namespace "${RANCHER_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

    # ── 3. imagePullSecret ────────────────────────────────────────
    - |
      DOCKER_AUTH=$(echo -n "${REGISTRY_USER}:${REGISTRY_PASSWORD}" | base64 -w0)
      kubectl create secret generic gitlab-registry-rancher \
        --from-literal=.dockerconfigjson="{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${REGISTRY_USER}\",\"password\":\"${REGISTRY_PASSWORD}\",\"auth\":\"${DOCKER_AUTH}\"}}}" \
        --type=kubernetes.io/dockerconfigjson \
        --namespace="${RANCHER_NAMESPACE}" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ── 4. TLS secret (nom imposé par Rancher) ────────────────────
    - |
      kubectl create secret tls tls-rancher-ingress \
        --cert="${TLS_CERT_FILE}" \
        --key="${TLS_KEY_FILE}" \
        --namespace="${RANCHER_NAMESPACE}" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ── 5. CA secret (requis si privateCA=true) ───────────────────
    - |
      kubectl create secret generic tls-ca \
        --from-file=cacerts.pem="${CA_CERT_FILE}" \
        --namespace="${RANCHER_NAMESPACE}" \
        --dry-run=client -o yaml | kubectl apply -f -

    # ── 6. Helm upgrade --install ─────────────────────────────────
    - |
      helm upgrade --install rancher rancher-local/rancher \
        --version "${RANCHER_VERSION}" \
        --namespace "${RANCHER_NAMESPACE}" \
        --wait --timeout 15m \
        --set hostname="${RANCHER_DOMAIN}" \
        --set replicas="${REPLICAS}" \
        --set rancherImage="${PLATFORM_REGISTRY}/rancher/rancher" \
        --set systemDefaultRegistry="${PLATFORM_REGISTRY}" \
        --set useBundledSystemChart=true \
        --set ingress.tls.source=secret \
        --set privateCA=true \
        --set ingress.ingressClassName=nginx \
        --set imagePullSecrets[0].name=gitlab-registry-rancher

    # ── 7. Vérification ───────────────────────────────────────────
    - kubectl rollout status deployment/rancher -n "${RANCHER_NAMESPACE}" --timeout=10m
    - echo "✓ Rancher ${RANCHER_VERSION} → https://${RANCHER_DOMAIN}"
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'




    # ── 6. Pull chart, patch kubeVersion, helm upgrade --install ──
    - |
      echo "==> Pull du chart rancher ${RANCHER_VERSION}"
      helm pull rancher-local/rancher \
        --version "${RANCHER_VERSION}" \
        --untar \
        --untardir /tmp/rancher-chart

      echo "==> Patch kubeVersion dans Chart.yaml"
      # Remplace la restriction kubeVersion pour accepter 1.35.x
      sed -i 's/kubeVersion:.*/kubeVersion: ">=1.25.0-0"/' \
        /tmp/rancher-chart/rancher/Chart.yaml

      echo "==> kubeVersion patché :"
      grep kubeVersion /tmp/rancher-chart/rancher/Chart.yaml

      echo "==> Déploiement Helm"
      helm upgrade --install rancher /tmp/rancher-chart/rancher \
        --version "${RANCHER_VERSION}" \
        --namespace "${RANCHER_NAMESPACE}" \
        --wait --timeout 15m \
        --set hostname="${RANCHER_DOMAIN}" \
        --set replicas="${REPLICAS}" \
        --set rancherImage="${PLATFORM_REGISTRY}/rancher/rancher" \
        --set systemDefaultRegistry="${PLATFORM_REGISTRY}" \
        --set useBundledSystemChart=true \
        --set ingress.tls.source=secret \
        --set privateCA=true \
        --set ingress.ingressClassName=nginx \
        --set imagePullSecrets[0].name=gitlab-registry-rancher






mirror-rancher-core-images:
  stage: mirror-images
  image: "${SKOPEO_IMAGE}"
  timeout: 90 minutes
  variables:
    TARGET_REGISTRY: "${GITLAB_REGISTRY}/rancher"
    RANCHER_VERSION:  "v2.13.3"
  before_script:
    - skopeo login "${CI_REGISTRY}"
        --username "${REGISTRY_USER}"
        --password "${REGISTRY_PASSWORD}"
  script:
    - |
      # ══════════════════════════════════════════════════════
      # Liste complète des images Rancher v2.13.3
      # Source : Dockerfile officiel + setting.go + Helm chart
      # ══════════════════════════════════════════════════════
      IMAGES=(

        # ── CORE ─────────────────────────────────────────────
        "rancher/rancher:v2.13.3"
        "rancher/rancher-agent:v2.13.3"

        # ── WEBHOOK (manquait) ────────────────────────────────
        # Extrait de : CATTLE_RANCHER_WEBHOOK_VERSION dans Dockerfile
        "rancher/rancher-webhook:v0.9.3"

        # ── AUDIT LOG SIDECAR ─────────────────────────────────
        "rancher/mirrored-bci-micro:15.4.14.3"

        # ── SHELL (kubectl/helm dans l'UI) ────────────────────
        "rancher/shell:v0.2.2"

        # ── MACHINE PROVISIONING ──────────────────────────────
        "rancher/machine:v0.15.0-rancher137"

        # ── SYSTEM AGENT ──────────────────────────────────────
        "rancher/system-agent:v0.3.14-suc"
        "rancher/system-agent-installer-rke2:v1.34.4-rke2r1"
        "rancher/system-agent-installer-rke2:v1.33.8-rke2r1"
        "rancher/system-agent-installer-rke2:v1.32.12-rke2r1"
        "rancher/system-agent-installer-k3s:v1.34.1-k3s1"

        # ── SYSTEM UPGRADE CONTROLLER (manquait) ──────────────
        # Chart version 108.0.0 → image v0.15.2
        "rancher/system-upgrade-controller:v0.15.2"

        # ── FLEET (GitOps) ────────────────────────────────────
        "rancher/fleet:v0.12.3"
        "rancher/fleet-agent:v0.12.3"

        # ── WINS AGENT (Windows nodes) ────────────────────────
        "rancher/wins:v0.5.3-r2"
      )

      # ── Copie skopeo vers GitLab Registry ─────────────────
      FAILED=()
      for image in "${IMAGES[@]}"; do
        NAME=$(echo "$image" | cut -d: -f1)
        TAG=$(echo "$image"  | cut -d: -f2)
        SRC="docker://docker.io/${image}"
        DST="docker://${TARGET_REGISTRY}/${NAME}:${TAG}"

        echo ""
        echo "==> [COPY] ${image}"
        echo "    SRC : ${SRC}"
        echo "    DST : ${DST}"

        if skopeo copy --retry-times 3 "${SRC}" "${DST}"; then
          echo "    ✅ OK"
        else
          echo "    ❌ ÉCHEC"
          FAILED+=("${image}")
        fi
      done

      # ── Rapport final ──────────────────────────────────────
      echo ""
      echo "══════════════════════════════════════"
      echo "  RÉSUMÉ : ${#IMAGES[@]} images traitées"
      if [ ${#FAILED[@]} -gt 0 ]; then
        echo "  ❌ ÉCHECS (${#FAILED[@]}) :"
        for f in "${FAILED[@]}"; do echo "    - $f"; done
        exit 1
      else
        echo "  ✅ Toutes les images copiées avec succès"
      fi
      echo "══════════════════════════════════════"

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  tags:
    - docker