# ─────────────────────────────────────────────────────────────
# RKE2 Cluster Deploy Pipeline
# Project : platform/rke2-cluster-deploy
# ─────────────────────────────────────────────────────────────

variables:
  RKE2_VERSION: "v1.32.1+rke2r1"
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"

stages:
  - prepare
  - bootstrap
  - validate
  - deploy

# ──────────────────────────────
# Stage prepare
# ──────────────────────────────
download-artifacts:
  stage: prepare
  image: $ANSIBLE_IMAGE
  when: manual
  script:
    - mkdir -p artifacts
    - PKG_URL="${GITLAB_URL}/api/v4/projects/${P1_PROJECT_ID}/packages/generic/rke2/${RKE2_VERSION}"
    - |
      wget --header="PRIVATE-TOKEN: ${P1_DEPLOY_TOKEN}" \
           -O artifacts/rke2.linux-amd64 \
           "${PKG_URL}/rke2.linux-amd64"
      wget --header="PRIVATE-TOKEN: ${P1_DEPLOY_TOKEN}" \
           -O artifacts/sha256sum-amd64.txt \
           "${PKG_URL}/sha256sum-amd64.txt"
    - cd artifacts && sha256sum -c sha256sum-amd64.txt --ignore-missing
    - echo "✓ Artefacts téléchargés et vérifiés"
  artifacts:
    paths:
      - artifacts/
    expire_in: 1 day

# ──────────────────────────────
# Stage bootstrap
# ──────────────────────────────
install-ca:
  stage: bootstrap
  image: $ANSIBLE_IMAGE
  when: manual
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - |
      ansible-playbook playbooks/install-ca.yml \
        -i inventory/cluster/ \
        -u root \
        -e "ca_cert_path=${REGISTRY_CA_CERT}"
    - echo "✓ CA installé sur tous les nœuds"

bootstrap-users:
  stage: bootstrap
  image: $ANSIBLE_IMAGE
  when: manual
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub
  script:
    - |
      ansible-playbook playbooks/bootstrap-users.yml \
        -i inventory/cluster/ \
        -u root \
        -e "deploy_user=${DEPLOY_USER}" \
        -e "ssh_public_key=$(cat ~/.ssh/id_rsa.pub)"
    - echo "✓ Utilisateur ${DEPLOY_USER} configuré sur tous les nœuds"

# ──────────────────────────────
# Stage validate
# ──────────────────────────────
check-inventory:
  stage: validate
  image: $ANSIBLE_IMAGE
  when: manual
  script:
    - ansible --version
    - ansible-inventory -i inventory/cluster/ --list --yaml
    - echo "✓ Inventaire valide"

check-connectivity:
  stage: validate
  image: $ANSIBLE_IMAGE
  when: manual
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - ansible all -i inventory/cluster/ -m ping
    - echo "✓ Connectivité SSH confirmée"

# ──────────────────────────────
# Stage deploy
# ──────────────────────────────
deploy-cluster:
  stage: deploy
  image: $ANSIBLE_IMAGE
  when: manual
  needs:
    - job: download-artifacts
      artifacts: true
    - job: check-connectivity
  before_script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$ANSIBLE_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - envsubst < registries.yaml.tpl > registries.yaml
    - |
      cat > deploy-vars.yml <<EOF
      rke2_install_version: "${RKE2_VERSION}"
      rke2_force_tarball_install: true
      rke2_install_local_tarball_path: "${CI_PROJECT_DIR}/artifacts/rke2.linux-amd64"
      rke2_registry_config_file_path: "${CI_PROJECT_DIR}/registries.yaml"
      cluster_rke2_config:
        system-default-registry: "${CI_REGISTRY}/platform/rke2-artefacts/rke2"
      EOF
    - ansible-playbook playbooks/site.yml -i inventory/cluster/ -b -e @deploy-vars.yml
    - echo "✓ Cluster RKE2 déployé"
