variables:
  ARGOCD_CHART_VERSION: "9.4.6"
  HELM_CHANNEL: "stable"

stages:
  - publish

publish-argocd-helm-chart:
  stage: publish
  image: alpine/helm:latest
  before_script:
    - apk add --no-cache curl
  script:
    - helm repo add argo https://argoproj.github.io/argo-helm
    - helm repo update
    - helm pull argo/argo-cd --version "${ARGOCD_CHART_VERSION}"
    - |
      curl --fail-with-body \
           --cacert "${GITLAB_CA_CERT_PATH}" \
           --request POST \
           --user "gitlab-ci-token:${CI_JOB_TOKEN}" \
           --form "chart=@argo-cd-${ARGOCD_CHART_VERSION}.tgz" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${HELM_CHANNEL}/charts"
  rules:
    - when: manual





fetch-kubeconfig:
  stage: deploy
  image: "${ANSIBLE_IMAGE}"
  script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "${ANSIBLE_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - |
      # Extraire le kubeconfig et remplacer 127.0.0.1 par l'IP du master
      ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${MASTER_IP} \
        "sudo cat /etc/rancher/rke2/rke2.yaml" \
        | sed "s/127.0.0.1/${MASTER_IP}/g" \
        > kubeconfig.yaml
    - echo "✓ Kubeconfig extrait → copier dans CI/CD variable CLUSTER_KUBECONFIG (type: File)"
  artifacts:
    paths:
      - kubeconfig.yaml
    expire_in: 1 hour
  when: manual



deploy-argocd:
  stage: platform
  image: "${DEPLOY_IMAGE}"
  variables:
    # ── Versions ──────────────────────────────────────────────────
    ARGOCD_CHART_VERSION: "7.8.23"
    ARGOCD_VERSION:       "v2.14.9"
    DEX_VERSION:          "v2.42.0"
    REDIS_VERSION:        "7.4.2-alpine"
    # ── Déploiement ───────────────────────────────────────────────
    ARGOCD_NAMESPACE:     "argocd"
    ARGOCD_DOMAIN:        "argocd.app.platform.local"
    TLS_SECRET_NAME:      "wildcard-app-tls"
    # ── Registre source (rke2-platform-services) ──────────────────
    PLATFORM_SERVICES_PATH: "platform/rke2-platform-services"
    # ── CI File variables (GitLab Settings) ───────────────────────
    # CLUSTER_KUBECONFIG → type File
    # TLS_CERT_FILE      → type File (PEM cert *.app.platform.local)
    # TLS_KEY_FILE       → type File (PEM key  *.app.platform.local)
    # DEPLOY_IMAGE       → image avec kubectl + helm inclus
  script:
    - PLATFORM_REGISTRY="${CI_REGISTRY}/${PLATFORM_SERVICES_PATH}"
    - export KUBECONFIG="${CLUSTER_KUBECONFIG}"

    - helm registry login "${CI_REGISTRY}" --username gitlab-ci-token --password "${CI_JOB_TOKEN}"

    - kubectl create namespace "${ARGOCD_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

    - |
      kubectl create secret tls "${TLS_SECRET_NAME}" \
        --cert="${TLS_CERT_FILE}" \
        --key="${TLS_KEY_FILE}"   \
        -n "${ARGOCD_NAMESPACE}"  \
        --dry-run=client -o yaml | kubectl apply -f -

    - |
      cat > /tmp/argocd-values.yaml << EOF
      global:
        image:
          repository: "${PLATFORM_REGISTRY}/argocd"
          tag:        "${ARGOCD_VERSION}"
      dex:
        image:
          repository: "${PLATFORM_REGISTRY}/dex"
          tag:        "${DEX_VERSION}"
      redis:
        image:
          repository: "${PLATFORM_REGISTRY}/redis"
          tag:        "${REDIS_VERSION}"
      server:
        extraArgs: ["--insecure"]
        ingress:
          enabled:          true
          ingressClassName: nginx
          hostname:         "${ARGOCD_DOMAIN}"
          tls:              true
          extraTls:
            - hosts:      ["${ARGOCD_DOMAIN}"]
              secretName: "${TLS_SECRET_NAME}"
      configs:
        params:
          server.insecure: "true"
        cm:
          url: "https://${ARGOCD_DOMAIN}"
      EOF

    - |
      helm upgrade --install argocd \
        "oci://${PLATFORM_REGISTRY}/argo-cd" \
        --version   "${ARGOCD_CHART_VERSION}" \
        --namespace "${ARGOCD_NAMESPACE}"     \
        --values    /tmp/argocd-values.yaml   \
        --wait --timeout 10m

    - kubectl rollout status deployment/argocd-server -n "${ARGOCD_NAMESPACE}" --timeout=5m
    - |
      PASS=$(kubectl get secret argocd-initial-admin-secret \
               -n "${ARGOCD_NAMESPACE}" \
               -o jsonpath="{.data.password}" | base64 -d)
      echo "✓ ArgoCD ${ARGOCD_VERSION} → https://${ARGOCD_DOMAIN}  admin / ${PASS}"
  when: manual





fetch-kubeconfig:
  stage: deploy
  image: "${ANSIBLE_IMAGE}"
  variables:
    KUBECONFIG_PATH: "/etc/rancher/rke2/rke2.yaml"
  script:
    # ── Extraire le premier master depuis l'inventaire ────────────
    - |
      MASTER_IP=$(python3 -c "
      import yaml
      with open('inventory/hosts.yml') as f:
          inv = yaml.safe_load(f)
      hosts = inv['all']['children']['rke2_servers']['hosts']
      print(list(hosts.values())[0]['ansible_host'])
      ")
      echo "MASTER_IP = ${MASTER_IP}"

    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "${ANSIBLE_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - |
      ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${MASTER_IP} \
        "sudo cat ${KUBECONFIG_PATH}" \
        | sed "s/127.0.0.1/${MASTER_IP}/g" \
        > kubeconfig.yaml
    - echo "✓ Kubeconfig extrait depuis ${MASTER_IP}"
  artifacts:
    paths:
      - kubeconfig.yaml
    expire_in: 1 hour
  when: manual


variables:
  ARGOCD_CHART_VERSION: "9.4.6"
  HELM_CHANNEL:         "stable"
  # ── Images versions ───────────────────────────────────────────
  ARGOCD_VERSION:       "v2.14.9"
  DEX_VERSION:          "v2.42.0"
  REDIS_VERSION:        "7.4.2-alpine"

stages:
  - publish

publish-argocd-helm-chart:
  stage: publish
  image: alpine/helm:latest
  before_script:
    - apk add --no-cache curl skopeo ca-certificates
    # Installer la CA self-signed pour curl ET skopeo
    - cp "${GITLAB_CA_CERT_PATH}" /usr/local/share/ca-certificates/gitlab-ca.crt
    - update-ca-certificates
  script:
    # ── 1. Images : internet → registre GitLab local ─────────────
    - skopeo login "${CI_REGISTRY}" --username gitlab-ci-token --password "${CI_JOB_TOKEN}"
    - |
      copy_image() {
        local src="$1" dst="$2"
        echo "▶  ${src}"
        echo "   → ${dst}"
        skopeo copy \
          --override-os   linux \
          --override-arch amd64 \
          "docker://${src}" \
          "docker://${dst}" \
          && echo "   ✓ OK" || { echo "   ✗ ERREUR"; exit 1; }
      }

      copy_image "quay.io/argoproj/argocd:${ARGOCD_VERSION}"               "${CI_REGISTRY_IMAGE}/argocd:${ARGOCD_VERSION}"
      copy_image "ghcr.io/dexidp/dex:${DEX_VERSION}"                       "${CI_REGISTRY_IMAGE}/dex:${DEX_VERSION}"
      copy_image "public.ecr.aws/docker/library/redis:${REDIS_VERSION}"     "${CI_REGISTRY_IMAGE}/redis:${REDIS_VERSION}"

    # ── 2. Chart Helm : upstream → Helm Package Registry GitLab ──
    - helm repo add argo https://argoproj.github.io/argo-helm
    - helm repo update
    - helm pull argo/argo-cd --version "${ARGOCD_CHART_VERSION}"
    - |
      curl --fail-with-body \
           --cacert "${GITLAB_CA_CERT_PATH}" \
           --request POST \
           --user "gitlab-ci-token:${CI_JOB_TOKEN}" \
           --form "chart=@argo-cd-${ARGOCD_CHART_VERSION}.tgz" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/${HELM_CHANNEL}/charts"
  rules:
    - when: manual









deploy-argocd:
  stage: deploy
  image: alpine/helm:latest
  script:
    - helm repo add gitlab-charts
        --username gitlab-ci-token
        --password "${CI_JOB_TOKEN}"
        --ca-file "${GITLAB_CA_CERT_PATH}"
        "https://git.local.c/api/v4/projects/${CHARTS_PROJECT_ID}/packages/helm/stable"
    - helm repo update
    - helm upgrade --install argocd gitlab-charts/argo-cd
        --version "${ARGOCD_CHART_VERSION}"
        --namespace argocd
        --create-namespace




